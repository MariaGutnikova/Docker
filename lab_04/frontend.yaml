apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-frontend-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: news-frontend
  template:
    metadata:
      labels:
        app: news-frontend
    spec:
      containers:
      - name: news-frontend
        image: corp-news-frontend:v1
        imagePullPolicy: IfNotPresent
        env:
        - name: BACKEND_URL
          value: "http://news-backend-service:8000"
        ports:
        - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: news-frontend-service
spec:
  type: NodePort
  selector:
    app: news-frontend
  ports:
    - port: 80
      targetPort: 8501
      nodePort: 30082
