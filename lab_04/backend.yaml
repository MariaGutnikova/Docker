apiVersion: apps/v1
kind: Deployment
metadata:
  name: news-backend-deploy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: news-backend
  template:
    metadata:
      labels:
        app: news-backend
    spec:
      containers:
      - name: news-backend
        image: corp-news-backend:v1
        imagePullPolicy: IfNotPresent
        env:
        - name: DB_HOST
          value: "news-postgres-service"
        - name: DB_USER
          value: "user"
        - name: DB_PASSWORD
          value: "password"
        - name: DB_NAME
          value: "news_db"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: news-backend-service
spec:
  selector:
    app: news-backend
  ports:
    - port: 8000
      targetPort: 8000
